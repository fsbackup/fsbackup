{% macro badge_inner(val) %}
  <span class="inline-flex items-center gap-1 text-xs font-medium
    {% if val == 'active' %}text-emerald-600 dark:text-emerald-400
    {% elif val == 'failed' %}text-red-500 dark:text-red-400
    {% elif val == 'activating' %}text-amber-500 dark:text-amber-400
    {% else %}text-zinc-400{% endif %}">
    <span class="w-1.5 h-1.5 rounded-full
      {% if val == 'active' %}bg-emerald-500
      {% elif val == 'failed' %}bg-red-500
      {% elif val == 'activating' %}bg-amber-400 animate-pulse
      {% else %}bg-zinc-400{% endif %}"></span>
    {{ val }}
  </span>
{% endmacro %}

{% for cls, statuses in units.items() %}
<span id="status-runner-{{ cls }}" hx-swap-oob="true">{{ badge_inner(statuses.runner) }}</span>
<span id="status-doctor-{{ cls }}" hx-swap-oob="true">{{ badge_inner(statuses.doctor) }}</span>
{% endfor %}

<span id="status-promote" hx-swap-oob="true">{{ badge_inner(promote_status) }}</span>
<span id="status-mirror"  hx-swap-oob="true">{{ badge_inner(mirror_status) }}</span>
